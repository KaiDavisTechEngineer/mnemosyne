name: mnemosyne

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check mnemosyne tests examples || true
      - name: Test
        run: pytest tests/ -v --tb=short
      - name: CLI smoke test
        run: |
          mnemosyne train --n-samples 12 --bc-epochs 1 --sae-steps 20 --rl-episodes 8 --out /tmp/m.pt
          mnemosyne eval --model /tmp/m.pt --n 4
          mnemosyne introspect --text "alice is taller than bob"
